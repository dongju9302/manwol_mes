name: Deploy to EC2

# 트리거: main 브랜치에 push 될 때 실행
on:
  push:
    branches:
      - main
  # 수동 실행도 가능하게 (GitHub UI에서 버튼 클릭)
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1단계: 소스코드 가져오기
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2단계: Docker Buildx 설정 (멀티플랫폼 빌드 도구)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3단계: Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4단계: 이미지 빌드 + Docker Hub에 푸시 (EC2용 linux/amd64)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/manwol_mes:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/manwol_mes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5단계: EC2에 SSH 접속 → deploy.sh 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/manwol_mes
            bash deploy.sh
