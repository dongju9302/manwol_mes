name: Deploy to EC2

# 트리거: main 브랜치에 push 될 때 실행
on:
  push:
    branches:
      - main
  # 수동 실행도 가능하게 (GitHub UI에서 버튼 클릭)
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1단계: 소스코드 가져오기
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2단계: Docker Buildx 설정 (멀티플랫폼 빌드 도구)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3단계: Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4단계: 이미지 빌드 + Docker Hub에 푸시 (EC2용 linux/amd64)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/manwol_mes:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/manwol_mes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4.4단계: EC2에 필요한 디렉토리 보장
      # scp-action은 target 디렉토리가 미리 존재해야 하므로 안전망으로 먼저 생성
      - name: Ensure EC2 directories exist
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/manwol_mes/nginx

      # 4.5단계: EC2 호스트 설정 파일 동기화
      # Docker 이미지는 컨테이너 내부 코드를 담지만, 아래 파일들은 EC2 호스트가 직접 사용
      # - docker-compose.yml: 컨테이너 구성 정의
      # - deploy.sh: 배포 자동화 스크립트
      # - nginx/nginx.conf: 리버스 프록시 설정
      - name: Sync host config files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,deploy.sh,nginx/nginx.conf,scripts/renew-cert.sh,scripts/CERT_RENEWAL_README.md"
          target: "/home/ubuntu/manwol_mes/"
          overwrite: true
          strip_components: 0

      # 5단계: EC2에 SSH 접속 → deploy.sh 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/manwol_mes
            bash deploy.sh
