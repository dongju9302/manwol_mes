# ============================================================
# Manwol MES - Nginx 리버스 프록시 설정
# 역할: 외부 요청을 받아 내부 Next.js 컨테이너로 전달
# 페이즈 3C-3: HTTPS(443) 서버 블록 추가
# ============================================================

# WebSocket 업그레이드 요청 여부에 따라 Connection 헤더 값 분기
# - Upgrade 헤더가 "websocket"이면 → Connection: upgrade (WebSocket 핸드셰이크)
# - Upgrade 헤더가 없거나 빈 값이면 → Connection: close (일반 HTTP 요청)
# map 블록은 http 컨텍스트에서 동작하며, conf.d/*.conf 는 http 블록 내에 include되므로 여기서 사용 가능
map $http_upgrade $connection_upgrade {
    default   close;
    ''        close;
    websocket upgrade;
}

server {
    # HTTP 80 포트 수신
    listen 80;

    # 처리할 도메인 이름
    server_name manwol-mes.duckdns.org;

    # 업로드 최대 크기 (파일 첨부 등 향후 기능 대비)
    client_max_body_size 10M;

    # 접근 로그: 요청 기록 (디버깅 및 모니터링용)
    access_log /var/log/nginx/access.log;

    # 오류 로그: 에러 기록
    error_log  /var/log/nginx/error.log;

    # --------------------------------------------------------
    # Let's Encrypt 챌린지 경로
    # Certbot이 도메인 소유 확인 시 이 경로를 사용함 (인증서 갱신에도 필요)
    # --------------------------------------------------------
    location /.well-known/acme-challenge/ {
        # certbot-www 볼륨의 마운트 경로에서 정적 파일 서빙
        root /var/www/certbot;
    }

    # --------------------------------------------------------
    # 나머지 모든 요청 → Next.js 컨테이너로 프록시 패스
    # nextjs는 docker-compose의 서비스명 (내부 DNS 자동 해석)
    # --------------------------------------------------------
    location / {
        proxy_pass http://nextjs:3000;

        # 원본 호스트명을 백엔드에 그대로 전달 (Next.js가 올바른 URL 생성에 필요)
        proxy_set_header Host              $host;

        # 실제 클라이언트 IP 전달 (로그, 보안 목적)
        proxy_set_header X-Real-IP         $remote_addr;

        # 프록시 체인 전체 IP 목록 전달
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # 클라이언트가 사용한 프로토콜(http/https) 전달
        # 페이즈 3D에서 COOKIE_SECURE=true 전환 시 이 헤더가 쿠키 발급 조건에 사용됨
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 업그레이드 헤더
        # Upgrade 요청일 때만 Connection: upgrade, 그 외는 Connection: close
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # 프록시 타임아웃 설정 (느린 응답 방어)
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }
}

# ============================================================
# HTTPS 443 서버 블록
# Let's Encrypt 인증서로 SSL 종료(SSL termination)를 담당
# 내부에서는 HTTP로 Next.js 컨테이너에 전달 (SSL offloading)
# ============================================================
server {
    # HTTPS 443 포트 수신, SSL 활성화
    listen 443 ssl;

    # 처리할 도메인 이름
    server_name manwol-mes.duckdns.org;

    # --------------------------------------------------------
    # SSL 인증서 설정 (Let's Encrypt, certbot-etc 볼륨 경로)
    # fullchain.pem: 서버 인증서 + 중간 CA 체인 포함
    # privkey.pem: 개인 키 (절대 외부 노출 금지)
    # --------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/manwol-mes.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manwol-mes.duckdns.org/privkey.pem;

    # --------------------------------------------------------
    # SSL 프로토콜 및 암호 모음 (보안 권고 기준)
    # TLSv1.2: 구형 클라이언트 호환성 유지
    # TLSv1.3: 최신 클라이언트용 (더 빠르고 안전)
    # SSLv3, TLSv1.0, TLSv1.1 은 보안 취약점으로 비활성화
    # --------------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # --------------------------------------------------------
    # SSL 세션 캐시 (재연결 시 TLS 핸드셰이크 비용 절감)
    # --------------------------------------------------------
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --------------------------------------------------------
    # OCSP Stapling (인증서 유효성 실시간 검증 성능 개선)
    # --------------------------------------------------------
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # 업로드 최대 크기
    client_max_body_size 10M;

    # 로그
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # HSTS: 5분 캐시 (운영 안정 확인 후 점진 증가 예정)
    # 300=5분 / 86400=1일 / 604800=1주 / 31536000=1년
    add_header Strict-Transport-Security "max-age=300" always;

    # --------------------------------------------------------
    # Let's Encrypt 챌린지 경로 (인증서 갱신 시 필요)
    # --------------------------------------------------------
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --------------------------------------------------------
    # 모든 요청 → Next.js 컨테이너로 프록시 패스
    # --------------------------------------------------------
    location / {
        proxy_pass http://nextjs:3000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # HTTPS로 접속했음을 Next.js에 전달 (쿠키 Secure 플래그 동작에 필요)
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }
}
