services:
  # ──────────────────────────────────────────────────────────
  # Nginx 리버스 프록시 (페이즈 3A: HTTP 80)
  # 외부 트래픽을 받아 nextjs 컨테이너로 전달
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: manwol-nginx
    ports:
      - "80:80"
      # 443은 페이즈 3B에서 추가 예정
    volumes:
      # Nginx 설정 파일 (읽기 전용 마운트)
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt 챌린지 파일 디렉토리 (페이즈 3B 인증서 발급 대비)
      - certbot-www:/var/www/certbot
      # Let's Encrypt 인증서 저장 디렉토리 (페이즈 3B 인증서 발급 대비)
      - certbot-etc:/etc/letsencrypt
    depends_on:
      - nextjs
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Next.js 앱 컨테이너
  # 호스트에 직접 노출하지 않고 Docker 내부 네트워크에서만 접근
  # ──────────────────────────────────────────────────────────
  nextjs:
    image: dongju9302/manwol_mes:latest
    container_name: manwol-nextjs
    # 호스트 포트 바인딩 제거 — Nginx를 통해서만 접근
    expose:
      - "3000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # PostgreSQL DB 컨테이너
  # ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: manwol-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 최초 컨테이너 실행 시 알파벳 순서로 자동 실행 (data 볼륨이 비어있을 때만)
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ──────────────────────────────────────────────────────────
# Named Volumes
# ──────────────────────────────────────────────────────────
volumes:
  # 게시글/댓글 등 영구 DB 데이터
  postgres_data:
  # Let's Encrypt 챌린지 파일 (페이즈 3B 인증서 발급 대비)
  certbot-www:
  # Let's Encrypt 인증서 저장 (페이즈 3B 인증서 발급 대비)
  certbot-etc:
